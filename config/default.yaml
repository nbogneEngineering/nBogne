# =============================================================================
# nBogne Adapter Configuration
# =============================================================================
# This configuration file controls all aspects of the nBogne transport layer.
# All values have sensible defaults optimized for GPRS/2G networks.
#
# Environment variables can override any setting using the pattern:
# NBOGNE_SECTION_KEY (e.g., NBOGNE_FACILITY_ID, NBOGNE_MEDIATOR_ENDPOINT)
# =============================================================================

# -----------------------------------------------------------------------------
# Facility Configuration
# -----------------------------------------------------------------------------
# Identifies this facility in the health information exchange network.
facility:
  # Unique facility identifier (max 8 characters for wire format)
  id: "FAC-001"
  
  # Human-readable facility name
  name: "Sample Health Facility"
  
  # SIM card phone number for SMS fallback
  phone_number: "+233500000000"

# -----------------------------------------------------------------------------
# Mediator Configuration
# -----------------------------------------------------------------------------
# Connection details for the central nBogne Mediator (at OpenHIM).
mediator:
  # HTTP endpoint for GPRS transmission
  # This is where encoded messages are POSTed
  endpoint: "https://mediator.example.com/gsm/inbound"
  
  # Phone number for SMS fallback (Africa's Talking format)
  sms_number: "+233549253610"
  
  # Optional API key for authentication
  # Set via environment variable NBOGNE_MEDIATOR_API_KEY for security
  api_key: null

# -----------------------------------------------------------------------------
# EMR Configuration
# -----------------------------------------------------------------------------
# Connection details for the local Electronic Medical Record system.
emr:
  # EMR type: openmrs, openemr, dhis2, or custom
  type: "openmrs"
  
  # Base URL for the local EMR
  base_url: "http://localhost:8080"
  
  # FHIR endpoint path
  fhir_endpoint: "/openmrs/ws/fhir2/R4"
  
  # Authentication token for EMR API (if required)
  auth_token: null
  
  # Polling interval in seconds (0 = push mode)
  # Push mode: EMR sends data to adapter
  # Poll mode: Adapter polls EMR for new data
  polling_interval: 0

# -----------------------------------------------------------------------------
# Transmission Configuration
# -----------------------------------------------------------------------------
# GPRS transmission parameters optimized for unreliable networks.
# Based on RFC 3481 and documented GPRS performance measurements.
transmission:
  # TCP connection timeout in seconds
  # GPRS PDP context activation takes 12-25 seconds
  # Recommended: 30 seconds minimum
  timeout_connect: 30.0
  
  # HTTP read timeout in seconds
  # GPRS throughput is 20-50 kbps, so large responses take time
  # Recommended: 120 seconds for responses up to 200KB
  timeout_read: 120.0
  
  # Maximum retry attempts before moving to dead letter queue
  # With exponential backoff, 5 retries spans ~5 minutes
  max_retries: 5
  
  # Base delay for exponential backoff in seconds
  # Actual delay = random(0, base_delay * 2^attempt)
  base_delay: 3.0
  
  # Maximum delay cap in seconds
  # Prevents excessive wait times
  max_delay: 300.0
  
  # Enable full jitter on retry delays
  # Recommended: true (prevents thundering herd)
  jitter: true
  
  # HTTP keep-alive interval in seconds
  # GPRS connections may timeout after 60 seconds idle
  keepalive_interval: 55.0

# -----------------------------------------------------------------------------
# Queue Configuration
# -----------------------------------------------------------------------------
# Persistent message queue for store-and-forward reliability.
queue:
  # Path to SQLite database file
  db_path: "data/outbox.db"
  
  # Maximum queue size (0 = unlimited)
  # When full, new messages are rejected until space is available
  max_size: 10000
  
  # Messages to process per drain cycle
  batch_size: 10
  
  # Seconds between queue drain attempts when queue is empty
  drain_interval: 5.0
  
  # Days to keep acknowledged messages for audit
  retention_days: 30

# -----------------------------------------------------------------------------
# Modem Configuration
# -----------------------------------------------------------------------------
# GSM modem settings for GPRS connectivity.
modem:
  # Serial port for modem
  # Linux: /dev/ttyUSB0, /dev/ttyACM0
  # Mac: /dev/cu.usbserial-*
  # Windows: COM3, COM4, etc.
  port: "/dev/ttyUSB0"
  
  # Serial baudrate (typically 115200 for modern modems)
  baudrate: 115200
  
  # Access Point Name for your mobile carrier
  # Ghana: mtn (MTN), surfnet (Vodafone), airteltigo (AirtelTigo)
  # Kenya: safaricom (Safaricom), telkom (Telkom)
  apn: "internet"
  
  # APN username (often empty)
  apn_user: ""
  
  # APN password (often empty)
  apn_password: ""
  
  # SIM PIN code (if required)
  pin: null
  
  # Modem model hint for AT command compatibility
  # Options: quectel, simcom, huawei, auto
  model: "auto"

# -----------------------------------------------------------------------------
# Server Configuration
# -----------------------------------------------------------------------------
# HTTP server for receiving FHIR data from the local EMR.
server:
  # Bind address (0.0.0.0 = all interfaces, 127.0.0.1 = localhost only)
  host: "0.0.0.0"
  
  # Port number
  port: 8081
  
  # URL path for FHIR endpoint
  path: "/fhir"

# -----------------------------------------------------------------------------
# Logging Configuration
# -----------------------------------------------------------------------------
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: "INFO"
  
  # Log file path (null = stdout only)
  file: "logs/nbogne.log"
  
  # Maximum log file size before rotation (bytes)
  max_bytes: 10485760  # 10 MB
  
  # Number of backup files to keep
  backup_count: 5
  
  # Log message format
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
